# Конфиденциальные настройки - override для src/main/resources/application.yml
# Этот файл НЕ должен коммититься в репозиторий

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}

telegram:
  bot:
    token: ${TELEGRAM_BOT_TOKEN}
    username: ${TELEGRAM_BOT_USERNAME}

football-data:
  api:
    token: ${FOOTBALL_DATA_TOKEN}
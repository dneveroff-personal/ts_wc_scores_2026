services:
  postgres:
    image: postgres:16-alpine
    container_name: wc_scores_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: wc_scores
      POSTGRES_USER: wc_user
      POSTGRES_PASSWORD: wc_pass
    ports:
      - "5432:5432"
    volumes:
      # Данные хранятся в ./data/postgres на хосте — легко перенести на другую машину
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - tswc-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wc_user -d wc_scores"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: wc_scores_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/wc_scores
      DB_USER: wc_user
      DB_PASSWORD: wc_pass
    networks:
      - tswc-network
    ports:
      - "8080:8080"
      - "5004:5004"

networks:
  tswc-network:
    driver: bridge

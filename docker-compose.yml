# Только PostgreSQL в Docker — приложение запускается напрямую через systemd
services:
  postgres:
    image: postgres:16-alpine
    container_name: wc_scores_db
    restart: unless-stopped
    user: "999:999"
    environment:
      POSTGRES_DB: wc_scores
      POSTGRES_USER: wc_user
      POSTGRES_PASSWORD: wc_pass
    ports:
      - "127.0.0.1:5432:5432"   # только локально — не наружу
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wc_user -d wc_scores"]
      interval: 10s
      timeout: 5s
      retries: 5

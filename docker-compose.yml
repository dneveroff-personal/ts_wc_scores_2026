# Только для локальной разработки — на VPS PostgreSQL установлен напрямую
services:
  postgres:
    image: postgres:16-alpine
    container_name: wc_scores_db
    restart: unless-stopped
    user: "999:999"
    environment:
      POSTGRES_DB: wc_scores
      POSTGRES_USER: wc_user
      POSTGRES_PASSWORD: wc_pass
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wc_user -d wc_scores"]
      interval: 10s
      timeout: 5s
      retries: 5

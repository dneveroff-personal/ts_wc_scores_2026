spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/wc_scores}
    username: ${DB_USER:wc_user}
    password: ${DB_PASSWORD:wc_pass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

telegram:
  admin-chat-id: ${TELEGRAM_ADMIN_CHAT_ID:0}
  bot:
    token: ${TELEGRAM_BOT_TOKEN}
    username: ${TELEGRAM_BOT_USERNAME}

football-data:
  api:
    url: https://api.football-data.org/v4
    token: ${FOOTBALL_DATA_TOKEN}
    competition-code: WC

scoring:
  exact-score: 5
  correct-outcome: 2
  goal-difference: 1

scheduler:
  sync-matches: "0 0 */2 * * *"
  calculate-scores: "0 0 * * * *"
  send-reminders: "0 0 * * * *"

predictions:
  window:
    hours: 100

logging:
  level:
    com.tswcscores: DEBUG
    org.telegram: INFO
admin-chat-id: ${TELEGRAM_ADMIN_CHAT_ID:0}
